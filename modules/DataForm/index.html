<!-- loading screen -->
<div id="loading-overlay">
    <div class="loading-box">Loading/ஏற்றுகிறது...</div>
</div>
<!--templates for inspectors-->
<template id="inspectors-template">
    <div class="dynamic-row">
        <input type="text" name="PDI inspector" placeholder="Inspector name" required/>
        <button type="button" class="delete_btn" onclick="this.parentElement.remove()">✕</button>
    </div>
</template>

<!--templates for issues-->
<template id="issues-template">
    <div class="dynamic-row">
        <input type="text" name="description" placeholder="Description">
        <input type="text" name="issue" placeholder="Issue">
        <input type="number" name="qty" placeholder="Qty" min="1">
        <select name="status">
            <option value="Hold">Hold</option>
            <option value="Reworked">Reworked</option>
            <option value="Scraped">Scraped</option>
        </select>
        <button type="button" class="delete_btn" onclick="this.parentElement.remove()">✕</button>
    </div>
</template>

<!--templates for attachments-->
<template id="file-template">
    <div>
        <p class="name" data-dz-name></p>
    </div>
</template>

<div class="form-wrapper">
    <header class="form-header">
        <h1>PDI Entry Form</h1>
    </header>
    <form id="form">
        <!--Project Reference number(string)-->
        <label for="input-Project Reference number">Project Reference number/திட்ட குறிப்பு எண்:</label>
        <input type="text" id="input-Project Reference number" name="Project Reference number" required>
        
        <!--Customer name(string)-->
        <label for="input-Customer name">Customer name/வாடிக்கையாளர் பெயர்:</label>
        <input type="text" id="input-Customer name" name="Customer name" required>
        <hr>

        <div class="form-grid">
            <div><!--Container number(int)-->
                <label for="input-Container number">Container number/கொள்கலன் எண்:</label>
                <input type="number" id="input-Container number" name="Container number"  min="1" required>
            </div>
            
            <div><!--Container ID(string)-->
                <label for="input-Container ID">Container ID/கொள்கலன் ஐடி:</label>
                <input type="text" id="input-Container ID" name="Container ID" required>
            </div>
        </div>
        <div class="form-grid">
            <div><!--Container size([ '40 feet','20 feet','Air' ])-->
                <label for="input-Container size">Container size/கொள்கலன் அளவு:</label>
                <select id="input-Container size" name="Container size" required>
                    <option value="40 feet">40 feet</option>
                    <option value="20 feet">20 feet</option>
                    <option value="Air">Air</option>
                </select>
            </div>
            <div><!--Date(Date)-->
                <label for="input-Date">Date/தேதி:</label>
                <input type="date" id="input-Date" name="Date"required>
            </div>
            <div><!--Shift([ 'A','B','C' ])-->
                <label for="input-Shift">Shift/ஷிப்ட்:</label>
                <select id="input-Shift" name="Shift" required>
                    <option value="A">A</option>
                    <option value="B">B</option>
                    <option value="C">C</option>
                </select>
            </div>
            <div><!--Status(['WIP','Completed'])-->
                <label for="input-Status">Status/நிலைமை:</label>
                <select id="input-Status" name="Status" required>
                    <option value="WIP">WIP/நிலுவையில் உள்ளது</option>
                    <option value="Completed">Completed/முடிந்தது</option>
                </select>
            </div>
        </div>
        <hr>

        <div class="dynamic-section-header"><!--PDI inspectors([ name(string) ])-->
            <label>PDI inspectors/பிடிஐ ஆய்வாளர்கள்:</label>
            <button type="button" class="add_btn" onclick="addRow('inspectors')">+</button>
        </div>
        <div id="inspectors-container"></div>
        <hr>

        <div class="dynamic-section-header"><!--Issues([ [ issue(string),qty(int),status(sting) ] ])-->
            <label>Issues/சிக்கல்கள்:</label>
            <button type="button" class="add_btn" onclick="addRow('issues')">+</button>
        </div>
        <div id="issues-container"></div>
        <hr>

        <div class="form-grid">
            <div><!--PDI report images-->
                <label for="report-attachments">PDI report/பிடிஐ அறிக்கை:</label>
                <div id="pdi-dropzone" class="dropzone"></div>
                <input type="file" id="report-attachments" name="PDI report images" accept="image/*" multiple hidden>
            </div>
            <div><!--PDI loading images-->
                <label for="photo-attachments">PDI loading images/பிடிஐ படங்கள்:</label>
                <div id="photo-dropzone" class="dropzone"></div>
                <input type="file" id="photo-attachments" name="PDI loading images" accept="image/*" multiple hidden>
            </div> 
        </div>
        <label for="input-uploader">Uploaded by/பதிவேற்றியது:</label>
        <input type="text" id="input-uploader" name="uploader" required>
        <hr>
        <!--submit,clear buttons-->
        <div class="form-actions">
            <button type="submit" class="submit_btn">
                <span class="icon_span">✓</span> சமர்ப்பிக்கவும்
            </button>
            <button type="button" class="clear_btn" onclick="clearForm()">
                <span class="icon_span">✕</span> தெளிவு
            </button>
            <button type="button" class="remove_btn" onclick="clearAttachments()">
                <span class="icon_span">🗑</span> கோப்புகளை அகற்று
            </button>
        </div>
    </form>
</div>
